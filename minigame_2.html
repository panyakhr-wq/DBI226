<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storybook Reader - Minecraft Edition</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background-color: #ffffff; }
    #header { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); }
    /* #app { padding-top: 4.2rem; min-height: calc(100vh - 4.2rem); } */
    /* ลด Padding top ของแอปให้เหลือน้อยลง */
#app { 
    padding-top: 1rem; /* ลดจาก 4.2rem */
    min-height: calc(100vh - 7rem); 
    display: flex;
    align-items: flex-start; /* ให้เนื้อหาเริ่มจากด้านบน ไม่ต้องอยู่กลางจอเป๊ะ */
}
    @media (min-width: 1024px) { #app { padding-top: 4.2rem; } }
    
    /* Minecraft Potion Shape */
    .mc-potion-path {
      clip-path: polygon(
        37.5% 0%, 62.5% 0%, 62.5% 25%, 
        75% 25%, 75% 37.5%, 87.5% 37.5%, 87.5% 50%, 
        100% 50%, 100% 87.5%, 
        87.5% 87.5%, 87.5% 100%, 12.5% 100%, 12.5% 87.5%, 0% 87.5%, 0% 50%, 
        12.5% 50%, 12.5% 37.5%, 25% 37.5%, 25% 25%, 37.5% 25%
      );
    }

    /* Flipbook Styles */
    .reader-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 10, 30, 0.96); z-index: 900; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
    .reader-overlay.active { opacity: 1; pointer-events: all; }
    .book-card { perspective: 1200px; cursor: pointer; transition: transform 0.3s ease; }
    .book-card:hover { transform: translateY(-8px); }
    .book-cover-3d { position: relative; width: 180px; height: 260px; transform-style: preserve-3d; transition: transform 0.4s ease; box-shadow: 4px 4px 10px rgba(0,0,0,0.3); border-radius: 4px 12px 12px 4px; }
    
    .flipbook-container { perspective: 2000px; position: relative; }
    .flipbook { position: relative; transform-style: preserve-3d; }
    .page-wrapper { position: absolute; top: 0; width: 50%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000); transform-origin: left center; right: 0; z-index: 1; }
    .page-wrapper.flipped { transform: rotateY(-180deg); z-index: 10; }
    .page-front, .page-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0 8px 8px 0; overflow: hidden; display: flex; flex-direction: column; padding: 20px; }
    .page-front { background: #fefcf3; box-shadow: inset -4px 0 12px rgba(0,0,0,0.06); }
    .page-back { background: #faf6e8; transform: rotateY(180deg); border-radius: 8px 0 0 8px; box-shadow: inset 4px 0 12px rgba(0,0,0,0.06); }
    .left-page-static { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #fefcf3; border-radius: 8px 0 0 8px; box-shadow: inset 4px 0 12px rgba(0,0,0,0.06); display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
    .book-spine { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 16px; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.1), transparent, rgba(0,0,0,0.1)); z-index: 50; }
    
    .nav-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.15); color: white; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .nav-btn:disabled { opacity: 0.2; }
    .close-btn { position: absolute; top: 20px; right: 20px; color: white; z-index: 1000; }
    
    .animate-in { animation: fadeInUp 0.6s ease forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .flipbook { width: 90vw !important; height: 60vw !important; }
    }
  </style>
</head>

<body class="bg-gray-50">
  <div class="bg-gray-700 w-full h-[4.2rem] lg:h-[10rem] flex items-center justify-between px-6 lg:px-[10rem] shadow-xl ">
    
    <a href="index.html">
      <div class="flex-shrink-0 rounded-full shadow-lg hover:scale-110"> <img src="logohom.jpg" alt="Home Logo" width="120" style="border-radius: 50%;" class="w-[60px] lg:w-[120px]"> 
        </div>
    </a>

    <div class="flex gap-4 lg:gap-10">
      <a href="https://www.instagram.com/perfume.studio.kk?igsh=NDM1MnN1Y2p3dWZw" target="_blank" rel="noopener noreferrer">
        <div class="hover:scale-110"><img src="Instagram_logo_2022.svg" class="w-[3rem]" alt="iG"></div>
      </a>
        
      <a href="https://web.facebook.com/profile.php?id=61581338545900" target="_blank" rel="noopener noreferrer">
        <div class="hover:scale-110"><img src="Facebook_Logo_(2019).png" class="w-[3rem]" alt="iG"></div>
      </a>
    </div>

</div>

  <div id="app" class="w-full overflow-auto flex items-center justify-center" style="font-family: 'Prompt', sans-serif;">
    <main class="w-full max-w-7xl px-4 md:px-8 pb-20">
      <section class="flex flex-col md:flex-row justify-center gap-12 ">

        <div class="flex-1 max-w-2xl w-full">
          <div class="bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl border border-pink-100 p-4 sm:p-6 md:p-12">
            <h1 class="text-3xl font-bold text-center text-pink-800 mb-2">เครื่องผสมน้ำ</h1>
            <p class="text-center text-pink-600 mb-10 text-sm">หยดสีเพื่อสร้างกลิ่นเฉพาะตัว (สูงสุด 10 หยด)</p>

            <div class="flex flex-col md:flex-row items-center gap-6 md:gap-16">
              <div id="potion-area" class="text-center flex-shrink-0 relative">
                <div class="relative w-28 h-36 sm:w-32 sm:h-40 md:w-40 md:h-48 mx-auto bg-[#373737] mc-potion-path p-1 shadow-lg">
                  <div class="w-full h-full bg-white/40 mc-potion-path relative overflow-hidden">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[25%] h-[15%] bg-[#7e5539] z-20"></div>
                    <div id="liquid" class="absolute bottom-0 left-0 w-full transition-all duration-700 ease-out z-10" 
                         style="height: 0%; background: #f472b6;">
                         <div class="absolute top-0 left-0 w-full h-4 bg-white/20"></div>
                    </div>
                    <div class="absolute top-[35%] left-[15%] w-[15%] h-[30%] bg-white/30 z-20"></div>
                  </div>
                </div>
                <div id="drop-count" class="mt-6 text-3xl font-bold text-pink-600 font-mono">0 / 10</div>
                <p class="text-[10px] text-pink-400 mt-1 uppercase font-bold font-mono">DROPS</p>
              </div>

              <div class="flex-1 w-full">
                <div class="grid grid-cols-5 gap-3 mb-10">
                  <button onclick="addDrop('orange', '#f97316')" class="group flex flex-col items-center">
                    <div class="w-10 h-12 sm:w-11 sm:h-13 md:w-12 md:h-14 bg-[#373737] mc-potion-path p-[3px] group-hover:scale-110 transition-transform">
                      <div class="w-full h-full bg-orange-500 mc-potion-path"></div>
                    </div>
                  </button>
                  <button onclick="addDrop('pink', '#ec4899')" class="group flex flex-col items-center">
                    <div class="w-10 h-12 sm:w-11 sm:h-13 md:w-12 md:h-14 bg-[#373737] mc-potion-path p-[3px] group-hover:scale-110 transition-transform">
                      <div class="w-full h-full bg-pink-500 mc-potion-path"></div>
                    </div>
                  </button>
                  <button onclick="addDrop('purple', '#a855f7')" class="group flex flex-col items-center">
                    <div class="w-10 h-12 sm:w-11 sm:h-13 md:w-12 md:h-14 bg-[#373737] mc-potion-path p-[3px] group-hover:scale-110 transition-transform">
                      <div class="w-full h-full bg-purple-500 mc-potion-path"></div>
                    </div>
                  </button>
                  <button onclick="addDrop('blue', '#3b82f6')" class="group flex flex-col items-center">
                    <div class="w-10 h-12 sm:w-11 sm:h-13 md:w-12 md:h-14 bg-[#373737] mc-potion-path p-[3px] group-hover:scale-110 transition-transform">
                      <div class="w-full h-full bg-blue-500 mc-potion-path"></div>
                    </div>
                  </button>
                  <button onclick="addDrop('black', '#18181b')" class="group flex flex-col items-center">
                    <div class="w-10 h-12 sm:w-11 sm:h-13 md:w-12 md:h-14 bg-[#373737] mc-potion-path p-[3px] group-hover:scale-110 transition-transform">
                      <div class="w-full h-full bg-zinc-900 mc-potion-path"></div>
                    </div>
                  </button>
                </div>

                <div class="flex gap-4">
                  <button onclick="mixPerfume()" class="hover:scale-110 transform duration-300 flex-1 py-4 bg-gradient-to-r from-pink-500 to-purple-500 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    ผสมน้ำหอม
                  </button>
                  <button onclick="resetLab()" class="px-6 py-4 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-2xl transition-colors">
                    <i data-lucide="rotate-cw" class="w-6 h-6">↻</i>
                  </button>
                </div>
              </div>
            </div>

            <div id="result-box" class="mt-12 p-8 bg-white/50 rounded-3xl border border-pink-200 hidden animate-in">
              <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-pink-500 rounded-full flex items-center justify-center text-white">
                  <i data-lucide="sparkles"></i>
                </div>
                <div>
                  <h3 id="perfume-name" class="text-2xl font-bold text-pink-800"></h3>
                  <p id="perfume-desc" class="text-pink-600 mt-1"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="reader-overlay" id="readerOverlay">
      <button class="close-btn" id="closeReader"><i data-lucide="x" class="w-8 h-8"></i></button>
      <button class="nav-btn" id="prevBtn" style="position:absolute;left:20px;z-index:150;"><i data-lucide="chevron-left"></i></button>
      
      <div class="flipbook-container">
        <div class="flipbook" id="flipbook" style="width: 800px; height: 500px;">
          <div class="book-spine"></div>
          <div class="left-page-static" id="leftPage"></div>
        </div>
      </div>
      
      <button class="nav-btn" id="nextBtn" style="position:absolute;right:20px;z-index:150;"><i data-lucide="chevron-right"></i></button>
      <div id="pageIndicator" style="position:absolute;bottom:30px;color:white;"></div>
    </div>
  </div>

      <div class="bg-black w-full h-[10rem] shadow-xl"></div>

  <script>
    // --- 2. Lab System (The Magic Mix) ---
    let totalDrops = 0;
    let counts = { orange: 0, pink: 0, purple: 0, blue: 0, black: 0 };
    const defaultColor = '#f472b6';

    function addDrop(color, hex) {
      if (totalDrops >= 10) return;
      createDroplet(hex);
      totalDrops++;
      counts[color]++;
      setTimeout(() => updateUI(hex), 400);
    }

    function createDroplet(hex) {
      const container = document.getElementById('potion-area');
      const drop = document.createElement('div');
      drop.style.cssText = `position:absolute;left:50%;top:0;width:12px;height:16px;background:${hex};border-radius:50% 50% 40% 40%;transform:translateX(-50%);z-index:100;transition:all 0.4s ease-in;`;
      container.appendChild(drop);
      setTimeout(() => { drop.style.top = '120px'; drop.style.opacity = '0'; }, 10);
      setTimeout(() => drop.remove(), 500);
    }

    function updateUI(hex = defaultColor) {
      document.getElementById('drop-count').textContent = `${totalDrops} / 10`;
      const liq = document.getElementById('liquid');
      liq.style.height = `${totalDrops * 10}%`;
      liq.style.backgroundColor = hex;
    }

    function mixPerfume() {
      if (totalDrops < 3) return alert("หยดสีอย่างน้อย 3 หยด!");
      document.getElementById('result-box').classList.remove('hidden');
      let top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
      const res = {
        orange: { name: "Soleil Glow", desc: "กลิ่นแดดเช้าสดชื่น" },
        pink: { name: "Sakura Mist", desc: "ความหวานละมุน" },
        purple: { name: "Night Queen", desc: "เสน่ห์ลึกลับ" },
        blue: { name: "Aqua Pure", desc: "บริสุทธิ์ดั่งสายน้ำ" },
        black: { name: "Dark Ebony", desc: "ความสุขุมนุ่มลึก" }
      };
      document.getElementById('perfume-name').textContent = res[top].name;
      document.getElementById('perfume-desc').textContent = res[top].desc;
    }

    function resetLab() {
      totalDrops = 0;
      Object.keys(counts).forEach(k => counts[k] = 0);
      document.getElementById('result-box').classList.add('hidden');
      updateUI(defaultColor); // แก้ไขจุดนี้ให้สีกลับเป็นสีเริ่มต้น
    }

    // --- 3. Event Listeners ---
    document.getElementById('openBookBtn').onclick = openStory;
    document.getElementById('closeReader').onclick = () => document.getElementById('readerOverlay').classList.remove('active');
    document.getElementById('nextBtn').onclick = goNext;
    document.getElementById('prevBtn').onclick = goPrev;
    lucide.createIcons();
  </script>
</body>
</html>
