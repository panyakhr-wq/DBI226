<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="bg-pink-100 w-full h-64 lg:h-80 flex items-center px-10 lg:px-24 shadow-sm">
        <img src="s1.png" alt="Logo" class="rounded-full w-32 lg:w-[250px] object-contain">
    </div>

    <div class="flex flex-col items-center w-full -mt-10 lg:-mt-20 px-4 pb-20">
        <div class="bg-white w-full max-w-[1200px] z-10 shadow-2xl rounded-[3rem] flex flex-col items-center py-12 lg:py-20 gap-10 lg:gap-16 border border-gray-100">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-10 px-6 lg:px-16 w-full">
                <div class="lg:mt-10"><img src="f1.jpg" class="w-full rounded-2xl shadow-md"></div>
                <div><img src="f2.jpg" class="w-full rounded-2xl shadow-md"></div>
                <div class="lg:mt-10"><img src="f3.jpg" class="w-full rounded-2xl shadow-md"></div>
            </div>

            <button class="bg-purple-500 hover:bg-purple-600 text-white px-10 py-4 lg:px-32 lg:py-8 rounded-2xl text-xl lg:text-4xl font-bold shadow-lg transition-all active:scale-95 mb-10">
                Mini Game
            </button>
        </div>
    </div>
</body>
</html>
