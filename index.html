<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex flex-col gap-10 lg:gap-16">

                </div>

                <div class="mt-8">

                </div>
            </div>
